<!DOCTYPE html>
<html>
    <head>
        <title>Got Your Card</title>
    </head>
    <body>
        <div id="main-menu">
            <button onclick="createGame()">Create Game</button>
            <form id="join-room-form" action="">
                <label>Active Room:
                    <input id="input-roomid"/>
                </label>
                <button id="submit-roomid-btn">Join</button>
            </form>
        </div>
        <div id="lobby">
            <h1>Lobby</h1><br>
            Room Code:
            <h2 id="room-code"></h2>
            <ul id="player-list">

            </ul>
        </div>
        <!--This loads the clientside socket.io code-->
        <script src="/socket.io/socket.io.js"></script>
        <script>
            //io() normally takes the URL to connect to as an argument. If none is
            //provided, it defaults to the host that serves this page
            var socket = io();
            const id = getCookie('gycID');

            var form = document.getElementById('join-room-form');
            var input = document.getElementById('input-roomid');
            //When the user submits text in the form, that message is
            //emitted to the server
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                if (input.value) {
                    socket.emit('join-room', id, input.value);
                    //input.value = '';
                }
            });

            //When a message is received from the server, it gets
            //displayed in the webpage
            var playerList = document.getElementById('player-list');
            var room = document.getElementById('room-code');
            socket.on('joined-room', (roomID, players) => {
                //window.scrollTo(0, document.body.scrollHeight);
                playerList.innerHTML = "";
                room.innerHTML = roomID;
                players.forEach(player => {
                    var item = document.createElement('li');
                    item.textContent = player;
                    playerList.appendChild(item);
                });
            });

            socket.on('get-id', () => {
                socket.emit('received-id', id);
            })
            socket.on('error', (msg) => {
                alert(msg);
            })
            function createGame(){
                socket.emit('create-room', id);
            }
            //Grepper ftw
            function getCookie(name) {
                var nameEQ = name + "=";
                var ca = document.cookie.split(';');
                for(var i=0;i < ca.length;i++) {
                    var c = ca[i];
                    while (c.charAt(0)==' ') c = c.substring(1,c.length);
                    if (c.indexOf(nameEQ) == 0) return c.substring(nameEQ.length,c.length);
                }
                return null;
            }
        </script>
    </body>
</html>
